<!DOCTYPE html>
<html>
  <head>
    <title>JS Broken 1 — Counter</title>
    <style>
      body { font-family: sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; }
      button { padding: 10px 18px; cursor: pointer; }
      h1 { font-size: 24px; }
    </style>
  </head>
  <body>

    <h1>Cars in showroom: <span id="count">0</span></h1>
    <button id="add-btn">Add a car</button>
    <button id="remove-btn">Remove a car</button>

    <script>
      const countDisplay = document.querySelector("#count")
      const addBtn = document.querySelector("#add-btn");
      const removeBtn = document.querySelector("#remove-btn");

      let carCount = 0;

      addBtn.addEventListener("click", function() {
        carCount = carCount + 1;
        countDisplay.textContent = carCount;
      });

      removeBtn.addEventListener("click", function() {
        carCount = carCount - 1;
        countDisplay.textContent = carCount;
      });

      console.log("Page ready");
    </script>

  </body>
</html>
